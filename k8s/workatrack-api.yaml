apiVersion: apps/v1
kind: Deployment
metadata:
  name: workatrack-api
  labels:
    app: workatrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workatrack
  template:
    metadata:
      labels:
        app: workatrack
    spec:
      initContainers:
        - name: db-migrate
          image: workatrack:latest
          imagePullPolicy: Never
          command:
            - sh
            - -lc
            - |
              python - <<'PY'
              import socket, time
              host = "postgres"
              port = 5432
              for _ in range(60):
                  try:
                      s = socket.create_connection((host, port), timeout=2)
                      s.close()
                      print("Postgres OK")
                      break
                  except Exception:
                      time.sleep(2)
              else:
                  raise SystemExit("Postgres NOT reachable")
              PY
              flask db upgrade
          env:
            - name: FLASK_APP
              value: "app:create_app"

            - name: FLASK_ENV
              valueFrom:
                configMapKeyRef:
                  name: workatrack-config
                  key: FLASK_ENV

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: workatrack-secret
                  key: DATABASE_URL

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: workatrack-secret
                  key: SECRET_KEY

            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"

            - name: OLLAMA_EMBED_MODEL
              value: "nomic-embed-text"
            - name: OLLAMA_QA_HARD_TIMEOUT_SECS
              value: "360"
            - name: QA_JOBS_TTL_SECS
              value: "86400"
            - name: SENTIMENT_EMBED_PROVIDER
              value: "ollama"

            - name: SENTIMENT_EMBED_MIN_SIM_NO_KW
              value: "0.55"

            - name: SENTIMENT_EMBED_TIMEOUT_SECS
              value: "30"

            - name: SENTIMENT_PREFILTER_TOP_N
              value: "25"

            - name: OLLAMA_QA_MODEL
              value: "qwen2.5:3b"

            - name: OLLAMA_QA_TIMEOUT_SECS
              value: "180"

            - name: QA_TEMPERATURE
              value: "0.2"

            - name: QA_MAX_EVIDENCES
              value: "8"

            - name: QA_MAX_CHARS_EVIDENCE
              value: "300"

            - name: QA_MAX_TOTAL_CHARS
              value: "2400"

            - name: QA_DEEP_ALGO_VERSION
              value: "5"


      containers:
        - name: workatrack
          image: workatrack:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              protocol: TCP
          env:
            - name: FLASK_APP
              value: "app:create_app"

            - name: FLASK_ENV
              valueFrom:
                configMapKeyRef:
                  name: workatrack-config
                  key: FLASK_ENV

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: workatrack-secret
                  key: DATABASE_URL

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: workatrack-secret
                  key: SECRET_KEY

            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"

            - name: OLLAMA_EMBED_MODEL
              value: "nomic-embed-text"
            - name: OLLAMA_QA_HARD_TIMEOUT_SECS
              value: "360"
            - name: QA_JOBS_TTL_SECS
              value: "86400"
            - name: SENTIMENT_EMBED_PROVIDER
              value: "ollama"

            - name: SENTIMENT_EMBED_MIN_SIM_NO_KW
              value: "0.55"

            - name: SENTIMENT_EMBED_TIMEOUT_SECS
              value: "30"

            - name: SENTIMENT_PREFILTER_TOP_N
              value: "25"

            - name: OLLAMA_QA_MODEL
              value: "qwen2.5:3b"

            - name: OLLAMA_QA_TIMEOUT_SECS
              value: "180"

            - name: QA_TEMPERATURE
              value: "0.2"

            - name: QA_MAX_EVIDENCES
              value: "8"

            - name: QA_MAX_CHARS_EVIDENCE
              value: "300"

            - name: QA_MAX_TOTAL_CHARS
              value: "2400"

            - name: QA_DEEP_ALGO_VERSION
              value: "5"

---
apiVersion: v1
kind: Service
metadata:
  name: workatrack-service
spec:
  type: ClusterIP
  selector:
    app: workatrack
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
