apiVersion: apps/v1
kind: Deployment
metadata:
  name: workatrack-api
  labels:
    app: workatrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workatrack
  template:
    metadata:
      labels:
        app: workatrack
    spec:
      initContainers:
        - name: db-migrate
          image: workatrack:latest
          imagePullPolicy: Never
          command:
            - sh
            - -lc
            - |
              python - <<'PY'
              import socket, time
              host = "postgres"
              port = 5432
              for _ in range(60):
                  try:
                      s = socket.create_connection((host, port), timeout=2)
                      s.close()
                      print("Postgres OK")
                      break
                  except Exception:
                      time.sleep(2)
              else:
                  raise SystemExit("Postgres NOT reachable")
              PY
              flask db upgrade
          env:
            - name: FLASK_APP
              value: "app:create_app"

            - name: FLASK_ENV
              valueFrom:
                configMapKeyRef:
                  name: workatrack-config
                  key: FLASK_ENV

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: workatrack-secret
                  key: DATABASE_URL

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: workatrack-secret
                  key: SECRET_KEY

      containers:
        - name: workatrack
          image: workatrack:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              protocol: TCP
          env:
            - name: FLASK_APP
              value: "app:create_app"

            - name: FLASK_ENV
              valueFrom:
                configMapKeyRef:
                  name: workatrack-config
                  key: FLASK_ENV

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: workatrack-secret
                  key: DATABASE_URL

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: workatrack-secret
                  key: SECRET_KEY

---
apiVersion: v1
kind: Service
metadata:
  name: workatrack-service
spec:
  type: ClusterIP
  selector:
    app: workatrack
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
