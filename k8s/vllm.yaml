apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-embed
  namespace: workatrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-embed
  template:
    metadata:
      labels:
        app: vllm-embed
    spec:
      containers:
        - name: vllm-embed
          image: vllm/vllm-openai:latest
          ports:
            - containerPort: 8000
          args:
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --model
            - "BAAI/bge-small-en-v1.5"
            - --task
            - "embed"
            - --served-model-name
            - "bge-small"
          env:
            - name: HF_HOME
              value: /root/.cache/huggingface
          volumeMounts:
            - name: vllm-embed-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: vllm-embed-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-embed
  namespace: workatrack
spec:
  selector:
    app: vllm-embed
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
