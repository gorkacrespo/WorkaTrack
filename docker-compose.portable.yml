name: workatrack_portable

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: workatrack
      POSTGRES_USER: workatrack
      POSTGRES_PASSWORD: workatrack
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workatrack -d workatrack"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:0.17.7
    entrypoint: ["/bin/sh", "/app/docker/ollama.entrypoint.compose.sh"]
    volumes:
      - ollama_data:/root/.ollama
      - ./docker/ollama.entrypoint.compose.sh:/app/docker/ollama.entrypoint.compose.sh:ro
      - ./demo/ollama/Modelfile.workatrack-qa-fast.compose:/models/Modelfile.workatrack-qa-fast.compose:ro
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q workatrack-qa-fast && ollama list | grep -q nomic-embed-text"]
      interval: 10s
      timeout: 10s
      retries: 30

  web:
    build:
      context: .
      dockerfile: Dockerfile.compose
    environment:
      FLASK_APP: app:create_app
      FLASK_RUN_HOST: 0.0.0.0
      SECRET_KEY: workatrack-demo-secret
      DATABASE_URL: postgresql+psycopg2://workatrack:workatrack@db:5432/workatrack
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: nomic-embed-text
      OLLAMA_QA_MODEL: workatrack-qa-fast:latest
      OLLAMA_QA_TIMEOUT_SECS: "180"
      OLLAMA_QA_HARD_TIMEOUT_SECS: "360"
      QA_DEEP_ALGO_VERSION: "8"
      QA_FAST_V2_ENABLED: "1"
      QA_FAST_LLM_NUM_PREDICT: "192"
      QA_FAST_LLM_TIMEOUT_SECS: "180"
      QA_FAST_RECENT_WEEKS: "3"
      QA_FAST_SUMMARIES_TOTAL_MAX_CHARS: "4500"
      QA_FAST_WEEK_SUMMARY_MAX_CHARS: "700"
      QA_JOBS_TTL_SECS: "86400"
      QA_MAX_EVIDENCES: "8"
      QA_MAX_CHARS_EVIDENCE: "300"
      QA_MAX_TOTAL_CHARS: "2400"
      QA_TEMPERATURE: "0.2"
      SENTIMENT_EMBED_PROVIDER: ollama
      SENTIMENT_EMBED_MIN_SIM_NO_KW: "0.55"
      SENTIMENT_EMBED_TIMEOUT_SECS: "30"
      SENTIMENT_PREFILTER_TOP_N: "25"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontworkatrack
      dockerfile: Dockerfile.compose
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      web:
        condition: service_started
    ports:
      - "3000:80"

  seed-demo:
    build:
      context: .
      dockerfile: Dockerfile.compose
    environment:
      FLASK_APP: app:create_app
      FLASK_RUN_HOST: 0.0.0.0
      SECRET_KEY: workatrack-demo-secret
      DATABASE_URL: postgresql+psycopg2://workatrack:workatrack@db:5432/workatrack
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: nomic-embed-text
      OLLAMA_QA_MODEL: workatrack-qa-fast:latest
      OLLAMA_QA_TIMEOUT_SECS: "180"
      OLLAMA_QA_HARD_TIMEOUT_SECS: "360"
      QA_DEEP_ALGO_VERSION: "8"
      QA_FAST_V2_ENABLED: "1"
      QA_FAST_LLM_NUM_PREDICT: "192"
      QA_FAST_LLM_TIMEOUT_SECS: "180"
      QA_FAST_RECENT_WEEKS: "3"
      QA_FAST_SUMMARIES_TOTAL_MAX_CHARS: "4500"
      QA_FAST_WEEK_SUMMARY_MAX_CHARS: "700"
      QA_JOBS_TTL_SECS: "86400"
      QA_MAX_EVIDENCES: "8"
      QA_MAX_CHARS_EVIDENCE: "300"
      QA_MAX_TOTAL_CHARS: "2400"
      QA_TEMPERATURE: "0.2"
      SENTIMENT_EMBED_PROVIDER: ollama
      SENTIMENT_EMBED_MIN_SIM_NO_KW: "0.55"
      SENTIMENT_EMBED_TIMEOUT_SECS: "30"
      SENTIMENT_PREFILTER_TOP_N: "25"
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["python", "-m", "app.scripts.seed_portable_demo"]
    restart: "no"

volumes:
  db_data:
  ollama_data:
