# -------------------------------------------------------
# Pipeline CI para WorkaTrack (backend Flask)
# -------------------------------------------------------
# Objetivos:
# 1) Stage "test": comprobar que el código compila y que create_app() funciona.
# 2) Stage "build": construir y subir la imagen Docker al registry de GitLab
#    usando Kaniko.
#
# Más adelante podremos añadir:
# - Tests con pytest.
# - Despliegue automático a Kubernetes.
# -------------------------------------------------------

# Imagen base por defecto para los jobs que no la sobrescriban
image: python:3.12-slim

# Variables comunes a todos los jobs
variables:
  # Carpeta donde pip guardará la caché (para acelerar instalaciones)
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# Definimos las fases (stages) del pipeline
stages:
  - test
  - build

# Caché compartida entre jobs
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/pip

# -------------------------------------------------------
# before_script: se ejecuta antes de cada job que use la
# imagen por defecto (python:3.12-slim)
# -------------------------------------------------------
before_script:
  # Mostrar versión de Python (útil para depuración en CI)
  - python --version
  # Actualizar pip
  - pip install --upgrade pip
  # Instalar las dependencias del proyecto
  - pip install -r requirements.txt

# -------------------------------------------------------
# Job: test_backend  (STAGE: test)
# -------------------------------------------------------
# Comprueba que:
# - El código de app/ se puede compilar.
# - La factoría create_app() funciona al importarla.
# -------------------------------------------------------
test_backend:
  stage: test
  script:
    # 1) Compilar todos los módulos Python (detecta errores de sintaxis)
    - python -m compileall app
    # 2) Intentar crear la app Flask
    - python -c "from app import create_app; app = create_app(); print('create_app OK')"

  # Aquí podríamos añadir tags específicas del runner si hiciera falta
  # tags:
  #   - kubernetes
  #   - python

# -------------------------------------------------------
# Job: build_image  (STAGE: build)
# -------------------------------------------------------
# Construye la imagen Docker de WorkaTrack y la sube al
# container registry de GitLab usando Kaniko.
# -------------------------------------------------------
build_image:
  stage: build

  # Usamos Kaniko en lugar de docker-in-docker
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]

  script:
    # Crear configuración de Docker para autenticarse contra el registry de GitLab
    - mkdir -p /kaniko/.docker
    - >
      cat <<EOF > /kaniko/.docker/config.json
      {
        "auths": {
          "${CI_REGISTRY}": {
            "username": "${CI_REGISTRY_USER}",
            "password": "${CI_REGISTRY_PASSWORD}"
          }
        }
      }
      EOF

    # Ejecutar Kaniko: construye y push a dos tags:
    # - ${CI_COMMIT_REF_SLUG} (por rama)
    # - latest
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}"
      --destination "${CI_REGISTRY_IMAGE}:latest"

  # Solo construimos imagen cuando los cambios van a master
  only:
    - master
